<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is PressArk?","acceptedAnswer":{"@type":"Answer","text":"PressArk is a specialized AI copilot integrated directly into your WordPress admin. It helps run WordPress websites and WooCommerce stores with content automation, SEO workflows, store operations, and technical troubleshooting inside wp-admin."}},{"@type":"Question","name":"Is this a WordPress plugin or web app?","acceptedAnswer":{"@type":"Answer","text":"It is a native WordPress plugin. The primary interface lives inside your WordPress sidebar for day-to-day operational access, while licensing and account management sit outside that operator surface."}},{"@type":"Question","name":"How do I install the plugin?","acceptedAnswer":{"@type":"Answer","text":"Download the ZIP from your account dashboard or GitHub, then upload it from Plugins > Add New > Upload Plugin in WordPress. After activation, enter your license details or configure BYOK during onboarding."}},{"@type":"Question","name":"What are credits?","acceptedAnswer":{"@type":"Answer","text":"Credits represent the compute budget used for AI requests. Different tasks consume different amounts depending on token length, model choice, and workflow complexity."}},{"@type":"Question","name":"Do credits roll over?","acceptedAnswer":{"@type":"Answer","text":"Monthly plan credits do not roll over. Extra credit packs are only used after the monthly allocation is exhausted and do not follow the same monthly reset behavior."}},{"@type":"Question","name":"Can I upgrade or downgrade anytime?","acceptedAnswer":{"@type":"Answer","text":"Yes. Plans are billed monthly and can be adjusted as needed. Upgrades are handled immediately, while downgrade timing follows the commercial billing cycle."}},{"@type":"Question","name":"What is BYOK?","acceptedAnswer":{"@type":"Answer","text":"BYOK means Bring Your Own Key. It lets you connect your own provider credentials so requests go through your selected AI provider rather than relying on PressArk-managed request budgets."}},{"@type":"Question","name":"Which AI models are supported?","acceptedAnswer":{"@type":"Answer","text":"PressArk supports GPT-4o, Claude Sonnet 4, DeepSeek V3, Gemini-family models, and models available through OpenRouter. Model selection is configurable per request."}},{"@type":"Question","name":"Is my data sent to third parties?","acceptedAnswer":{"@type":"Answer","text":"When using BYOK, prompts go directly to your chosen provider. When using managed credits, requests use PressArk-managed routing. Privacy and security pages explain the current retention and routing boundaries in more detail."}}]}</script>
